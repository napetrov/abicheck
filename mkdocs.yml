site_name: abicheck
site_description: ABI compatibility checker for C/C++ shared libraries
site_url: https://napetrov.github.io/abicheck
repo_url: https://github.com/napetrov/abicheck
repo_name: napetrov/abicheck
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
    - CLI Usage: user-guide/cli-usage.md
    - Tool Modes: user-guide/tool-modes.md
    - Application Compatibility: user-guide/appcompat.md
    - Policy Profiles: user-guide/policies.md
    - Suppressions: user-guide/suppressions.md
    - Severity Configuration: user-guide/severity.md
    - Output Formats: user-guide/output-formats.md
    - Local Compare: user-guide/local-compare.md
    - MCP Integration: user-guide/mcp-integration.md
    - GitHub Action: user-guide/github-action.md
    - Migrating from ABICC: user-guide/from-abicc.md
    - Migrating from libabigail: user-guide/from-libabigail.md
  - Concepts:
    - ABI Cheat Sheet: concepts/abi-cheat-sheet.md
    - Verdicts: concepts/verdicts.md
    - Architecture: concepts/architecture.md
    - ABI Breaks Explained: concepts/abi-breaks-explained.md
    - Breaking Cases Catalog: concepts/breaking-cases-catalog.md
    - Limitations: concepts/limitations.md
  - Reference:
    - Change Kinds: reference/change-kinds.md
    - Exit Codes: reference/exit-codes.md
    - Platforms: reference/platforms.md
    - Tool Comparison: reference/tool-comparison.md
    - ABICC Format Compliance: reference/abicc-format-compliance.md
  - Troubleshooting: troubleshooting.md
  - Development:
    - Goals: development/goals.md
    - Codebase Overview: development/codebase-overview.md
    - Testing: development/testing.md
    - Report Comparison: development/report-comparison.md
    - ABICC Parity Status: development/abicc-parity-status.md
    - ABICC Test Coverage Comparison: development/abicc-test-coverage-comparison.md
    - ADR:
      - Overview: development/adr/index.md
      - "001: Technology Stack": development/adr/001-technology-stack.md
      - "002: Multi-Binary Release Compare": development/adr/002-multi-binary-release-compare.md
      - "003: Data Source Architecture": development/adr/003-data-source-architecture.md
      - "004: Report Filtering & Dedup": development/adr/004-report-filtering-and-deduplication.md
      - "005: Application Compat Check": development/adr/005-application-compat-check.md
      - "006: Package-Level Comparison": development/adr/006-package-level-comparison.md
      - "007: BTF & CTF Debug Formats": development/adr/007-btf-ctf-debug-formats.md
      - "008: Full-Stack Dependency Validation": development/adr/008-full-stack-dependency-validation.md
      - "009: Verdict System and Exit Codes": development/adr/009-verdict-system-and-exit-codes.md
      - "010: Policy Profile System": development/adr/010-policy-profile-system.md
      - "011: Change Classification Taxonomy": development/adr/011-change-classification-taxonomy.md
      - "012: ABICC Compatibility Layer": development/adr/012-abicc-compatibility-layer.md
      - "013: Suppression System": development/adr/013-suppression-system.md
      - "014: Output Format Strategy": development/adr/014-output-format-strategy.md
      - "015: Snapshot Serialization": development/adr/015-snapshot-serialization.md
      - "016: Visibility Model": development/adr/016-visibility-model.md
      - "017: GitHub Action": development/adr/017-github-action.md
      - "018: Cross-Platform Support": development/adr/018-cross-platform-support.md
      - "019: Testing Strategy": development/adr/019-testing-strategy.md
      - Gap Analysis: development/adr/adr-gap-analysis.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/napetrov/abicheck
