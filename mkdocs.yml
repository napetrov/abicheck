site_name: abicheck
site_description: ABI compatibility checker for shared libraries — drop-in replacement for ABICC, libabigail-aware
site_url: https://napetrov.github.io/abicheck
repo_url: https://github.com/napetrov/abicheck
repo_name: napetrov/abicheck
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Concepts:
    - Verdicts: concepts/verdicts.md
    - Limitations: concepts/limitations.md
    - Troubleshooting: concepts/troubleshooting.md
  - User Guide:
    - Using abicheck: usage_and_coverage.md
    - Tool Modes: tool_modes.md
    - Exit Codes: exit_codes.md
    - Policy Profiles: policies.md
    - SARIF Output: sarif_output.md
    - Migrating from ABICC: migration/from_abicc.md
    - Examples Breakage Guide: examples_breakage_guide.md
    - Local Compare: local_compare.md
  - Reference:
    - Architecture: reference/architecture.md
    - Change Kind Reference: reference/change_kinds.md
    - ABI Break Catalog: abi_breaking_cases_catalog.md
    - ABICC Compatibility: abicc_compat.md
    - Format Compliance: abicc_format_compliance.md
    - libabigail Parity: libabigail_parity.md
    - Tool Comparison: tool_comparison.md
    - Gap Report: gap_report.md
    - Coverage Report: coverage_report.md
    - Benchmark Report: benchmark_report.md
    - V2 Coverage Plan: v2_coverage_plan.md
  - Development:
    - Testing Strategy: testing_coverage.md
    - Codebase Analysis: codebase_analysis.md
    - ABICC Test Coverage Comparison: abicc_test_coverage_comparison.md
  - Architecture Decisions:
    - ADR Index: adr/index.md
    - ADR-001 Technology Stack: adr/001-technology-stack.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/napetrov/abicheck
