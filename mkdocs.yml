site_name: abicheck
site_description: ABI compatibility checker for C/C++ shared libraries
site_url: https://napetrov.github.io/abicheck
repo_url: https://github.com/napetrov/abicheck
repo_name: napetrov/abicheck
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Concepts:
    - Verdicts: concepts/verdicts.md
    - Limitations: concepts/limitations.md
    - Troubleshooting: concepts/troubleshooting.md
  - User Guide:
    - CLI Usage: usage_and_coverage.md
    - Tool Modes: tool_modes.md
    - GitHub Action: github-action.md
    - Policy Profiles: policies.md
    - SARIF Output: sarif_output.md
    - Examples & Breakage Guide: examples_breakage_guide.md
    - Local Compare: local_compare.md
    - ABICC Compatibility: abicc_compat.md
  - Reference:
    - Exit Codes: exit_codes.md
    - Change Kind Reference: reference/change_kinds.md
    - ABI Break Catalog: abi_breaking_cases_catalog.md
    - Architecture: reference/architecture.md
    - Benchmark & Tool Comparison: tool_comparison.md
    - Format Compliance: abicc_format_compliance.md
    - libabigail Parity: libabigail_parity.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/napetrov/abicheck
