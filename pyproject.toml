[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "abicheck"
version = "0.1.0"
description = "ABI compatibility checker: castxml-based header dumper + Python checker"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "defusedxml>=0.7.1",
    "pyelftools>=0.29",   # ELF/DWARF parsing — Sprint 2+ (ADR-001)
]

[project.scripts]
abicheck = "abicheck.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "ruff>=0.3",
    "types-PyYAML",
]

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
# pyelftools has no type stubs or py.typed marker — all its APIs are untyped.
# Disabling no-untyped-call for elf_metadata.py avoids false CI failures
# while keeping strict checking on all other modules.
module = "abicheck.elf_metadata"
disallow_untyped_calls = false

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration: requires castxml, gcc/g++ installed"]
