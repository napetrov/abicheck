[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "abicheck"
version = "0.1.0"
description = "ABI compatibility checker for C/C++ shared libraries (ELF/DWARF/castxml multi-tier analysis)"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "defusedxml>=0.7.1",
    "pyelftools>=0.29",   # ELF/DWARF parsing — Sprint 2+ (ADR-001)
    "google-re2>=1.1",    # RE2 suppression engine — Phase 2 (O(N) guaranteed)
]

[project.scripts]
abicheck = "abicheck.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "ruff>=0.3",
    "types-PyYAML",
]

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
# pyelftools has no type stubs or py.typed marker — all its APIs are untyped.
# Disable strict checks for modules that directly call pyelftools APIs.
module = ["abicheck.elf_metadata", "abicheck.dwarf_metadata"]
disallow_untyped_calls = false
disable_error_code = ["attr-defined", "unused-ignore"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: requires castxml, gcc/g++ installed",
    "libabigail: requires abidiff + gcc/g++ — libabigail parity tests",
    "abicc: requires abi-compliance-checker + gcc/g++ — ABICC parity tests",
]

[tool.coverage.run]
branch = true
source = ["abicheck"]

[tool.coverage.report]
show_missing = true
skip_covered = false
