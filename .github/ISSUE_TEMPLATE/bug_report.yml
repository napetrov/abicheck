name: Bug Report
description: Report a bug or unexpected behaviour in abicheck
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: "abicheck reports X but I expected Y"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Run `abicheck compare libfoo.so.1 libfoo.so.2 --headers include/`
        2. See error / wrong verdict
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include full output / error message.
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: abicheck version
      description: "`abicheck --version` output"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (ELF)
        - macOS (Mach-O)
        - Windows (PE/COFF)
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.0"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Any other context — attach library files, headers, policy files if safe to share.
