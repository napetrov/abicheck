name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, do not publish)"
        required: false
        default: false
        type: boolean

# Deny all permissions by default; jobs declare only what they need.
permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"  # consistent with main CI matrix

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check dist contents
        run: |
          pip install "twine>=5.1"
          twine check dist/*
          ls -lh dist/

      - name: Smoke-test wheel install
        run: |
          pip install dist/*.whl
          python -c "import abicheck; print('abicheck version:', abicheck.__version__)"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Publish on Release event OR manual dispatch without dry_run flag
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    environment:
      name: pypi
      url: https://pypi.org/project/abicheck/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses Trusted Publishing (OIDC) — no API token needed.
        # Configure at: https://pypi.org/manage/project/abicheck/settings/publishing/
        # Note: pypa/gh-action-pypi-publish is pinned to branch 'release/v1'.
        # For stricter supply-chain hardening, pin to a commit SHA.
