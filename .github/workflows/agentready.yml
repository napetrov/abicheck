name: AgentReady

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Repository Scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: agentready
        uses: napetrov/agentready@main
        with:
          mode: scan
          job-summary: true
          upload-sarif: true
      - name: Upload SARIF
        if: always() && steps.agentready.outputs.sarif-report-path
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.agentready.outputs.sarif-report-path }}
          category: agentready

  diff:
    name: PR Readiness Diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: agentready
        uses: napetrov/agentready@main
        with:
          mode: diff
          base-ref: origin/${{ github.base_ref }}
          head-ref: HEAD
          fail-on-regression: true
          job-summary: true
          pr-comment: true
          upload-sarif: true
      - name: Upload SARIF
        if: always() && steps.agentready.outputs.sarif-report-path
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.agentready.outputs.sarif-report-path }}
          category: agentready
