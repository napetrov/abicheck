name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check abicheck/ tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail" \
            --cov=abicheck \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=52

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml gcc g++

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/test_abi_examples.py -v -m integration

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml zlib1g-dev

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: End-to-end demo (libz)
        run: python scripts/demo_libz.py

  libabigail-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ castxml
          sudo apt-get install -y abigail-tools || sudo apt-get install -y libabigail-tools

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run libabigail parity tests
        run: pytest tests/test_abidiff_parity.py -v -m libabigail --tb=short
