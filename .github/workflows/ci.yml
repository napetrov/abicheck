name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ai-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install mypy (for baseline-drift check)
        run: |
          python -m pip install --upgrade pip
          pip install mypy
      - name: AI-readiness checks (file size, CLAUDE.md coverage, ChangeKind invariants, mypy drift, import cycles)
        run: python scripts/check_ai_readiness.py
      - name: Install package (for FP-rate gate)
        run: pip install -e .
      - name: Scoping FP-rate gate (ADR-024 §7 — false positives/negatives vs baseline)
        run: python scripts/check_fp_rate.py

  lint-and-types:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]" mypy
      - name: Lint (ruff)
        run: ruff check abicheck tests
      - name: Type check (mypy)
        run: mypy abicheck
      - name: Install docs dependencies
        run: pip install mkdocs mkdocs-material pymdown-extensions
      - name: Build docs (strict)
        run: mkdocs build --strict

  unit-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12', '3.13', '3.14']
        allow-prereleases: [false]
        include:
          - os: windows-latest
            python-version: '3.13'
            allow-prereleases: false
          - os: macos-latest
            python-version: '3.13'
            allow-prereleases: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"
      - name: Run tests with coverage (Linux — enforces 95% floor)
        # Linux is the canonical lane: the full unit suite runs here, so the
        # 95% minimum-coverage floor is enforced on it. macOS/Windows skip the
        # Linux-only ELF/DWARF parsing tests, structurally lowering coverage,
        # so they run the same suite without the fail-under gate.
        if: runner.os == 'Linux'
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc and not slow" -n auto --dist worksteal --cov=abicheck --cov-report=term-missing --cov-report=xml --cov-fail-under=95
      - name: Run tests with coverage (macOS — report only, platform tests skip)
        if: runner.os == 'macOS'
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc and not slow" -n auto --dist worksteal --cov=abicheck --cov-report=term-missing --cov-report=xml
      - name: Run tests (Windows — parallel, no coverage)
        if: runner.os == 'Windows'
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc and not slow" -n auto --dist worksteal
      - name: Run slow tests (hypothesis / property-based)
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: |
          pytest tests/ -v --tb=short -m "slow" --cov=abicheck --cov-report=xml:coverage-slow.xml --cov-append
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  integration-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml gcc g++ cmake
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install castxml cmake
      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --no-progress --yes
          pip install castxml
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run integration tests (Linux/macOS — with coverage)
        if: runner.os != 'Windows'
        # ABICHECK_MIN_EXECUTED guards against a silent toolchain-install failure
        # turning the whole lane into 0-ran-but-green (see tests/conftest.py).
        # Linux's ELF integration count is known (~195) so it gets a real floor;
        # the macOS Mach-O subset count isn't verified here, so it uses a minimal
        # "> 0" floor — enough to catch a missing toolchain without risking a
        # false failure from platform subsetting.
        env:
          ABICHECK_MIN_EXECUTED: ${{ runner.os == 'macOS' && '1' || '20' }}
        run: |
          pytest tests/ -v -m integration --tb=short --cov=abicheck --cov-report=xml:coverage-integration.xml --ignore=tests/test_abi_examples.py
      - name: Run integration tests (Windows — parallel, no coverage)
        if: runner.os == 'Windows'
        # Same silent-skip guard: the xdist controller aggregates every worker's
        # reports, so the session-finish check in conftest.py works under -n auto
        # (verified). The Windows PE integration count isn't measured here, so a
        # minimal "> 0" floor catches a missing MinGW without false failures.
        env:
          ABICHECK_MIN_EXECUTED: '1'
        run: |
          pytest tests/ -v -m integration --tb=short -n auto --dist worksteal --ignore=tests/test_abi_examples.py
      - name: Upload integration coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage-integration.xml
          flags: integration
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml zlib1g-dev
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: End-to-end demo (libz)
        run: python scripts/demo_libz.py

  windows-msvc:
    name: MSVC + PDB end-to-end
    runs-on: windows-latest
    timeout-minutes: 20
    # Experimental lane: abicheck's pure-Python PDB parser is still maturing on
    # real MSVC output, so a failure here is informational (does not block the
    # PR). Tests self-skip when layout cannot be extracted; this flag covers
    # genuine parser/toolchain breakage until the lane is proven stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up MSVC developer environment (cl.exe on PATH)
        uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run MSVC + PDB end-to-end tests
        run: pytest tests/test_msvc_pdb_e2e.py -v -m msvc --tb=short

  cross-platform-e2e:
    # G1: native PE/Mach-O `compare` workflows + AArch64 AAPCS modeling.
    # Drives `abicheck compare` over binaries built by the *platform's own*
    # toolchain (Apple clang → .dylib, MinGW gcc → .dll) and asserts verdicts,
    # so the core workflow is validated end-to-end off the Linux baseline.
    #
    # Kept always-on (not path-gated): the jobs are short (~1 min) and a
    # path-filtered "skipped" status complicates branch-protection required
    # checks; the modest runner cost buys a reliable platform signal on every PR.
    name: Native PE/Mach-O compare workflows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install MinGW gcc (Windows — PE/DWARF)
        if: runner.os == 'Windows'
        run: choco install mingw --no-progress --yes
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Native PE/Mach-O compare workflow tests
        # Run ONLY the native, compiler-gated integration tests here. Every test
        # in this file is @pytest.mark.integration and needs clang/MinGW, so if
        # the native compiler is missing they all skip and the
        # ABICHECK_MIN_EXECUTED floor fails the lane — closing the silent-skip
        # hole where always-run unit tests could keep it green. (The AArch64
        # AAPCS64 unit tests run in the regular unit-tests lane on all OSes.)
        # Floor 5: each platform contributes ~7-8 native tests when the compiler
        # is present, so 5 is comfortably reachable yet 0 (all-skipped) fails.
        env:
          ABICHECK_MIN_EXECUTED: '5'
        run: pytest tests/test_cross_platform_integration.py -v -m integration --tb=short

  heavy-parity-gate:
    runs-on: ubuntu-latest
    outputs:
      run-heavy: ${{ steps.resolve.outputs.run-heavy }}
      reason: ${{ steps.resolve.outputs.reason }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed files for parity jobs (PR only)
        id: changed
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            heavy:
              - 'abicheck/**'
              - 'tests/**'
              - 'examples/**'
              - '.github/workflows/**'

      - name: Resolve parity gate output
        id: resolve
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run-heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=full-run-non-pr-event" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changed.outputs.heavy }}" = "true" ]; then
            echo "run-heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=relevant-files-changed" >> "$GITHUB_OUTPUT"
          else
            echo "run-heavy=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-relevant-changes" >> "$GITHUB_OUTPUT"
          fi

  libabigail-parity:
    needs: [heavy-parity-gate]
    if: needs.heavy-parity-gate.outputs.run-heavy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ castxml
          sudo apt-get install -y abigail-tools || sudo apt-get install -y libabigail-tools
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run libabigail parity tests
        # Fail loudly if abigail-tools didn't install (lane would otherwise skip
        # every test and pass) — see tests/conftest.py silent-skip guard.
        env:
          ABICHECK_MIN_EXECUTED: '5'
        run: pytest tests/test_abidiff_parity.py tests/test_abicompat_parity.py tests/test_abipkgdiff_parity.py -v -m libabigail --tb=short

  abicc-parity:
    needs: [heavy-parity-gate]
    if: needs.heavy-parity-gate.outputs.run-heavy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ castxml abi-compliance-checker
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run ABICC parity tests
        # Fail loudly if abi-compliance-checker didn't install (lane would
        # otherwise skip every test and pass) — see tests/conftest.py guard.
        env:
          ABICHECK_MIN_EXECUTED: '10'
        run: pytest tests/test_abicc_parity.py tests/test_xml_parity.py -v -m abicc --tb=short
      - name: Run XML schema validation tests (no ABICC required)
        run: pytest tests/test_xml_parity.py::TestXmlSchemaValidation tests/test_xml_report.py -v --tb=short

  packaging:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Build artifacts and validate metadata
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*
