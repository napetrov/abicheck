name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]" mypy
      - name: Lint (ruff)
        run: ruff check abicheck tests
      - name: Type check (mypy)
        run: mypy abicheck
      - name: Install docs dependencies
        run: pip install mkdocs mkdocs-material pymdown-extensions
      - name: Build docs (strict)
        run: mkdocs build --strict

  unit-tests:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12', '3.13', '3.14']
        allow-prereleases: [false]
        include:
          - os: windows-latest
            python-version: '3.13'
            allow-prereleases: false
          - os: macos-latest
            python-version: '3.13'
            allow-prereleases: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"
      - name: Run tests with coverage
        if: runner.os != 'Windows'
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc" --cov=abicheck --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Run tests (Windows — parallel, no coverage)
        if: runner.os == 'Windows'
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc" -n auto --dist worksteal
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  integration-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml gcc g++ cmake
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install castxml cmake
      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --no-progress --yes
          pip install castxml
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run integration tests (Linux/macOS — with coverage)
        if: runner.os != 'Windows'
        run: |
          pytest tests/ -v -m integration --tb=short --cov=abicheck --cov-report=xml:coverage-integration.xml --ignore=tests/test_abi_examples.py
      - name: Run integration tests (Windows — parallel, no coverage)
        if: runner.os == 'Windows'
        run: |
          pytest tests/ -v -m integration --tb=short -n auto --dist worksteal --ignore=tests/test_abi_examples.py
      - name: Upload integration coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage-integration.xml
          flags: integration
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml zlib1g-dev
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: End-to-end demo (libz)
        run: python scripts/demo_libz.py

  heavy-parity-gate:
    runs-on: ubuntu-latest
    outputs:
      run-heavy: ${{ steps.resolve.outputs.run-heavy }}
      reason: ${{ steps.resolve.outputs.reason }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files for parity jobs (PR only)
        id: changed
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            heavy:
              - 'abicheck/**'
              - 'tests/**'
              - 'examples/**'
              - '.github/workflows/**'

      - name: Resolve parity gate output
        id: resolve
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run-heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=full-run-non-pr-event" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changed.outputs.heavy }}" = "true" ]; then
            echo "run-heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=relevant-files-changed" >> "$GITHUB_OUTPUT"
          else
            echo "run-heavy=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-relevant-changes" >> "$GITHUB_OUTPUT"
          fi

  libabigail-parity:
    needs: [heavy-parity-gate]
    if: needs.heavy-parity-gate.outputs.run-heavy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ castxml
          sudo apt-get install -y abigail-tools || sudo apt-get install -y libabigail-tools
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run libabigail parity tests
        run: pytest tests/test_abidiff_parity.py -v -m libabigail --tb=short

  abicc-parity:
    needs: [heavy-parity-gate]
    if: needs.heavy-parity-gate.outputs.run-heavy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ castxml abi-compliance-checker
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run ABICC parity tests
        run: pytest tests/test_abicc_parity.py tests/test_xml_parity.py -v -m abicc --tb=short
      - name: Run XML schema validation tests (no ABICC required)
        run: pytest tests/test_xml_parity.py::TestXmlSchemaValidation tests/test_xml_report.py -v --tb=short

  packaging:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Build artifacts and validate metadata
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*
