name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" mypy
      - name: Lint (ruff)
        run: ruff check abicheck tests
      - name: Type check (mypy)
        run: mypy abicheck

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.13'
            allow-prereleases: false
          - python-version: '3.14'
            allow-prereleases: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc" \
            --cov=abicheck \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml gcc g++
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run integration tests with coverage
        run: |
          pytest tests/ -v -m integration --tb=short \
            --cov=abicheck \
            --cov-report=xml:coverage-integration.xml
      - name: Upload integration coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage-integration.xml
          flags: integration
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml zlib1g-dev
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: End-to-end demo (libz)
        run: python scripts/demo_libz.py

  heavy-parity-gate:
    runs-on: ubuntu-latest
    outputs:
      run-heavy: ${{ steps.resolve.outputs.run-heavy }}
      reason: ${{ steps.resolve.outputs.reason }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files for parity jobs (PR only)
        id: changed
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            heavy:
              - 'abicheck/**'
              - 'tests/**'
              - 'examples/**'
              - '.github/workflows/**'

      - name: Resolve parity gate output
        id: resolve
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run-heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=full-run-non-pr-event" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changed.outputs.heavy }}" = "true" ]; then
            echo "run-heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=relevant-files-changed" >> "$GITHUB_OUTPUT"
          else
            echo "run-heavy=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-relevant-changes" >> "$GITHUB_OUTPUT"
          fi

  libabigail-parity:
    needs: [heavy-parity-gate]
    if: needs.heavy-parity-gate.outputs.run-heavy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ castxml
          sudo apt-get install -y abigail-tools || sudo apt-get install -y libabigail-tools
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run libabigail parity tests
        run: pytest tests/test_abidiff_parity.py -v -m libabigail --tb=short

  abicc-parity:
    needs: [heavy-parity-gate]
    if: needs.heavy-parity-gate.outputs.run-heavy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ castxml abi-compliance-checker
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run ABICC parity tests
        run: pytest tests/test_abicc_parity.py tests/test_xml_parity.py -v -m abicc --tb=short
      - name: Run XML schema validation tests (no ABICC required)
        run: pytest tests/test_xml_parity.py::TestXmlSchemaValidation tests/test_xml_report.py -v --tb=short

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Build artifacts and validate metadata
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*
