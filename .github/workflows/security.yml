name: Security & Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pip-audit bandit
          pip install -e ".[dev]"

      - name: pip-audit
        # --skip-editable: skip the local editable install (abicheck itself)
        run: pip-audit --skip-editable

      - name: bandit
        run: bandit -r abicheck/ -ll

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@820e3160e279568db735cee8ed8f8e77a6da7818  # v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@820e3160e279568db735cee8ed8f8e77a6da7818  # v3

      - name: Analyze
        uses: github/codeql-action/analyze@820e3160e279568db735cee8ed8f8e77a6da7818  # v3
        with:
          category: "/language:${{ matrix.language }}"

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install mypy pyyaml click defusedxml types-PyYAML
          pip install -e ".[dev]"

      - name: mypy
        # strict mode is configured in pyproject.toml [tool.mypy]
        run: mypy abicheck/ --ignore-missing-imports
