name: Performance

# Flexible, non-gating performance tracking for the comparison pipeline.
#
# The post-processing bottlenecks that made `compare` blow up on large real
# libraries (e.g. libonedal_core.so, ~10,550 functions) are fixed — see
# docs/development/performance.md. This workflow guards against regressions: it
# runs the synthetic scaling benchmark and the `slow` perf tests, uploads the
# numbers, and writes them to the job summary. It is intentionally non-gating
# (continue-on-error) so it never blocks a merge while a budget is being tuned.
#
# How to turn gating on: add `--max-seconds <budget>` and/or
# `--max-exponent <slope>` to the scaling step below and drop
# `continue-on-error`. The thresholds are deliberately CLI flags so the budget
# lives in this workflow, not hard-coded in the script.

on:
  workflow_dispatch:
    inputs:
      sizes:
        description: "Function counts to sweep (space-separated)"
        required: false
        default: "500 1000 2000 4000"
      max_seconds:
        description: "Optional gate: fail if any compare exceeds this many seconds (blank = measure only)"
        required: false
        default: ""
  schedule:
    # Weekly, Monday 06:42 UTC — offset from other scheduled jobs.
    - cron: "42 6 * * 1"
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    paths:
      - "abicheck/diff_*.py"
      - "abicheck/checker.py"
      - "abicheck/checker_policy.py"
      - "abicheck/post_processing.py"
      - "abicheck/demangle.py"
      - "abicheck/binary_fingerprint.py"
      - "abicheck/surface.py"
      - "abicheck/suppression.py"
      - "abicheck/html_report.py"
      - "abicheck/sarif.py"
      - "abicheck/junit_report.py"
      - "abicheck/severity.py"
      - "abicheck/serialization.py"
      - "abicheck/pe_metadata.py"
      - "abicheck/macho_metadata.py"
      - "scripts/benchmark_scaling.py"
      - "tests/test_performance.py"
      - "tests/test_benchmark_scaling.py"
      - ".github/workflows/performance.yml"

permissions:
  contents: read

# The PR lane runs whenever a PR changes the detector core (the `paths` filter
# above), plus on the weekly schedule and on manual dispatch. It is
# `continue-on-error`, so auto-running on those PRs measures without blocking.
# Adding the `performance` label re-triggers the lane on a PR (the `labeled`
# event); for an arbitrary PR that does not touch the detector core, use
# `workflow_dispatch` to run it on demand.
jobs:
  scaling:
    name: Comparison scaling benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # c++filt for the ELF-only / namespace demangling scenario.
          sudo apt-get update -qq && sudo apt-get install -y binutils

      - name: Run scaling benchmark
        run: |
          set -euo pipefail
          mkdir -p reports/perf
          SIZES="${{ github.event.inputs.sizes || '500 1000 2000 4000' }}"
          GATE=""
          if [ -n "${{ github.event.inputs.max_seconds }}" ]; then
            GATE="--max-seconds ${{ github.event.inputs.max_seconds }}"
          fi
          python scripts/benchmark_scaling.py \
            --sizes $SIZES \
            --repeat 2 \
            --json-out reports/perf/scaling.json \
            $GATE | tee reports/perf/scaling.txt

      - name: Run slow perf tests
        run: |
          pytest tests/test_performance.py -v --tb=short -m slow

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Comparison scaling benchmark"
            echo ""
            echo '```'
            cat reports/perf/scaling.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: performance-scaling
          path: reports/perf

  # PR-vs-base regression: measure the base branch and this PR head on the same
  # runner and flag scenarios that got more than --regress-tolerance slower.
  # This catches *gradual* drift that the per-run scaling exponent misses. Only
  # runs on PRs (there is no baseline branch for schedule/dispatch). Base and
  # head are installed into separate venvs so the same package name can coexist;
  # the comparison is over the scenarios present on *both* branches. Non-gating
  # (continue-on-error) until a stable tolerance is established.
  regression:
    name: Baseline regression (PR vs base)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - name: Checkout base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false

      - name: Checkout head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: head
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Measure base branch
        run: |
          sudo apt-get update -qq && sudo apt-get install -y binutils
          python -m venv base_env
          ./base_env/bin/pip install -q --upgrade pip
          ./base_env/bin/pip install -q -e "./base[dev]"
          # The base script may predate newer flags/scenarios; only the scenarios
          # present on both branches are compared, so `|| true` keeps it robust.
          ./base_env/bin/python base/scripts/benchmark_scaling.py \
            --sizes 500 1000 2000 --repeat 2 \
            --json-out base.json || true

      - name: Measure head and compare to base
        run: |
          # pipefail so the benchmark's nonzero exit on a detected regression is
          # not masked by `tee` (the default Actions shell is `bash -e`, no
          # pipefail). The step then goes red on a regression; it still does not
          # block the merge while `continue-on-error` is set above.
          set -euo pipefail
          python -m venv head_env
          ./head_env/bin/pip install -q --upgrade pip
          ./head_env/bin/pip install -q -e "./head[dev]"
          ./head_env/bin/python head/scripts/benchmark_scaling.py \
            --sizes 500 1000 2000 --repeat 2 --no-memory \
            --baseline base.json --regress-tolerance 0.5 \
            | tee regression.txt

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Baseline regression (PR vs base)"
            echo ""
            echo '```'
            cat regression.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
