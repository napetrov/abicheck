name: Examples Validation (nightly cross-platform)

# Scheduled / on-demand only — never gates a PR. Extends the blocking Ubuntu
# examples lane (examples-validation.yml) across the producers and ABIs the
# recommendations call out: AArch64 (calling-convention / alignment / return-ABI
# differences invisible on x86_64) and macOS arm64 Mach-O.
#
# Windows/MinGW PE is intentionally NOT here: the example autodiscovery harness
# requires castxml (not reliably installable on the Windows runner), so it could
# only skip-all. Native PE-on-Windows coverage already lives in ci.yml's BLOCKING
# `cross-platform-e2e` lane (MinGW gcc + ABICHECK_MIN_EXECUTED=5, castxml-free),
# which runs on every PR — a nightly duplicate would add no real coverage.
on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-aarch64:
    name: Examples (Linux AArch64, ${{ matrix.toolchain }})
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        toolchain: [gcc, clang]
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml gcc g++ clang cmake binutils
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate examples (full catalog)
        run: |
          mkdir -p results
          PYTHONPATH=. python tests/validate_examples.py --toolchain ${{ matrix.toolchain }} --json \
            > results/validate_examples-aarch64-${{ matrix.toolchain }}.json
          cp results/validate_examples-aarch64-${{ matrix.toolchain }}.json results/validate_examples.json
          python tests/check_validate_results.py
      - name: Stripped FP guard (AArch64)
        if: always()
        run: |
          set +e
          PYTHONPATH=. python tests/validate_examples.py --toolchain ${{ matrix.toolchain }} \
            --artifact-variant stripped-headers --json > results/validate_examples-aarch64-stripped.json
          set -e
          python tests/check_stripped_fp.py results/validate_examples-aarch64-stripped.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: examples-nightly-aarch64-${{ matrix.toolchain }}
          path: results/
          retention-days: 14

  macos-arm64:
    name: Examples (macOS arm64, Apple Clang)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Install castxml + cmake
        run: brew install castxml cmake
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate examples (platform-filtered to macos)
        run: |
          mkdir -p results
          PYTHONPATH=. python tests/validate_examples.py --json \
            > results/validate_examples-macos.json
          cp results/validate_examples-macos.json results/validate_examples.json
          python tests/check_validate_results.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: examples-nightly-macos
          path: results/
          retention-days: 14
