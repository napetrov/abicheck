name: Examples Validation

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "abicheck/**"
      - "tests/validate_examples.py"
      - "tests/test_example_autodiscovery.py"
      - "tests/check_validate_results.py"
      - "tests/summarize_validate_results.py"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - "abicheck/**"
      - "tests/validate_examples.py"
      - "tests/test_example_autodiscovery.py"
  workflow_dispatch:

jobs:
  validate-examples:
    name: Validate all examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create results dir
        run: mkdir -p results

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml gcc g++

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate ground_truth.json
        run: |
          test -f examples/ground_truth.json || { echo "::error::ground_truth.json missing"; exit 1; }
          python -c "import json; d=json.load(open('examples/ground_truth.json')); print('ground_truth.json OK:', len(d['verdicts']), 'cases')"

      - name: Run example cases (pytest autodiscovery)
        run: |
          PYTHONPATH=. pytest tests/test_example_autodiscovery.py -v --tb=short -m integration \
            --junit-xml=results/examples-autodiscovery.xml

      - name: Cross-check via validate_examples.py
        if: always()
        run: |
          PYTHONPATH=. python tests/validate_examples.py --json > results/validate_examples.json
          python tests/check_validate_results.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: examples-validation-results
          path: results/
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          echo "## Examples Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          test -f results/validate_examples.json && python tests/summarize_validate_results.py >> $GITHUB_STEP_SUMMARY || true
