codecov:
  require_ci_to_pass: false

coverage:
  precision: 2
  round: down
  range: "60...90"

  status:
    project:
      default:
        target: auto
        threshold: 1%       # allow 1% drop without failing
        if_ci_failed: error
    patch:
      default:
        target: 80%         # new code should be well-tested
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true      # only comment when coverage changes

flags:
  unit:
    paths:
      - abicheck/
    carryforward: true
  integration:
    paths:
      - abicheck/
    carryforward: true
